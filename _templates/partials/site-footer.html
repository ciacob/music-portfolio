<script>
{{current.langSwitcherScript}}
</script>
<script>
(function () {
  var btn = document.querySelector('.site-header__hamburger');
  var nav = document.getElementById('primary-nav');
  if (!btn || !nav) return;
  btn.addEventListener('click', function () {
    var expanded = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', String(!expanded));
    nav.classList.toggle('site-nav--open', !expanded);
  });
  document.addEventListener('click', function (e) {
    if (!nav.contains(e.target) && !btn.contains(e.target)) {
      btn.setAttribute('aria-expanded', 'false');
      nav.classList.remove('site-nav--open');
    }
  });
})();
</script>

<script>
(function () {
  var panel = document.querySelector('.filter-panel');
  if (!panel) return;

  function update() {
    var overflows  = panel.scrollHeight > panel.clientHeight;
    var atTop      = panel.scrollTop <= 2;
    var atBottom   = panel.scrollHeight - panel.scrollTop <= panel.clientHeight + 2;

    panel.classList.toggle('filter-panel--fade-bottom', overflows && !atBottom);
    panel.classList.toggle('filter-panel--fade-top',    overflows && !atTop);
  }

  update();
  panel.addEventListener('scroll', update);
  new ResizeObserver(update).observe(panel);
})();
</script>
</body>
</html>
