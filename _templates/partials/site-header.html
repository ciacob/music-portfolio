<header class="site-header" role="banner">
  <div class="site-header__inner">

    <a class="site-header__brand" href="/{{current.lang}}/home.html">
      <span class="site-header__site-title">{{current.siteTitle}}</span>
      <span class="site-header__site-tagline">{{current.siteTagline}}</span>
    </a>

    <button class="site-header__hamburger"
            aria-controls="primary-nav"
            aria-expanded="false"
            aria-label="{{current.menuLabel}}">
      <span class="hamburger__bar"></span>
      <span class="hamburger__bar"></span>
      <span class="hamburger__bar"></span>
    </button>

    <nav class="site-nav" id="primary-nav" aria-label="{{current.menuLabel}}">
      <ul class="nav__list" role="list">
{{current.navItems}}
      </ul>
    </nav>

    <ul class="lang-picker" role="list" aria-label="{{current.langPickerLabel}}">
{{current.langPickerItems}}
    </ul>

  </div>
</header>
